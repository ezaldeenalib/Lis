version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lis_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: lis_user
      POSTGRES_PASSWORD: lis_password
      POSTGRES_DB: lis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lis_user -d lis_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lis_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lis_api
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://lis_user:lis_password@postgres:5432/lis_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRATION: 24h
      API_PORT: 4000
      NODE_ENV: production
      # Prisma: set RUN_MIGRATIONS_ON_BOOT=0 if you run `npm run db:deploy` in a separate Job.
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-1}
      PRISMA_SCHEMA_PATH: libs/database/prisma/schema.prisma
      # WhatsApp: mount WHATSAPP_AUTH_DATA_PATH; disable on replicas with WHATSAPP_ENABLED=0
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-1}
      WHATSAPP_AUTH_DATA_PATH: /var/lib/lis/whatsapp-auth
    volumes:
      - whatsapp_auth_data:/var/lib/lis/whatsapp-auth
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:4000/api/v1/health/live',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lis_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  whatsapp_auth_data:
