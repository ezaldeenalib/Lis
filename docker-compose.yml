# =============================================================================
# LIS SaaS — production Compose (PostgreSQL, Redis, API, Web)
# -----------------------------------------------------------------------------
# Build : docker compose build --no-cache web api
# Up    : docker compose up -d
# Logs  : docker compose logs -f api web
#
# Required in `.env` for remote access:
#   NEXT_PUBLIC_API_URL=http://YOUR_PUBLIC_IP_OR_DOMAIN:4000   # browser + build
#   DATABASE_URL=postgresql://USER:PASS@postgres:5432/DB?schema=public       # API container only
#   WEB_URL / CORS_ORIGINS matching your public web origin
#
# Never set NEXT_PUBLIC_* to http://api — browsers cannot resolve Docker DNS.
# API_INTERNAL_URL=http://api:4000 is server-side rewrites only (build arg).
#
# Health:
#   curl -sf http://127.0.0.1:4000/api/v1/health/live
#   curl -sf -o /dev/null http://127.0.0.1:3000/
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: lis_postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lis_password}
      POSTGRES_DB: ${POSTGRES_DB:-lis_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lis
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: lis_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    networks:
      - lis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: lis-api:latest
    container_name: lis_api
    restart: unless-stopped
    entrypoint: ['/usr/local/bin/docker-api-entrypoint.sh']
    command: ['node', 'dist/apps/api/main.js']
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://lis_user:lis_password@postgres:5432/lis_db?schema=public}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      API_PORT: 4000
      API_HOST: ${API_HOST:-0.0.0.0}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-1}
      PRISMA_SCHEMA_PATH: libs/database/prisma/schema.prisma
      MIGRATE_MAX_ATTEMPTS: ${MIGRATE_MAX_ATTEMPTS:-30}
      MIGRATE_RETRY_SLEEP_SEC: ${MIGRATE_RETRY_SLEEP_SEC:-3}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-1}
      WHATSAPP_AUTH_DATA_PATH: /var/lib/lis/whatsapp-auth
    volumes:
      - whatsapp_auth_data:/var/lib/lis/whatsapp-auth
    networks:
      - lis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:4000/api/v1/health/live',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 20s
      timeout: 8s
      retries: 6
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://142.132.189.60:4000}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    image: lis-web:latest
    container_name: lis_web
    restart: unless-stopped
    command: ['node', 'apps/web/server.js']
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    networks:
      - lis
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode&&r.statusCode<500?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 25s
      timeout: 8s
      retries: 6
      start_period: 120s

networks:
  lis:
    driver: bridge
    name: lis

volumes:
  postgres_data:
  redis_data:
  whatsapp_auth_data:
